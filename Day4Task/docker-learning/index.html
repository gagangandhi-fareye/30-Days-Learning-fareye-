<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Nginx App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 15px;
      background: rgba(0,0,0,0.4);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      padding: 10px 20px;
      background: #00c6ff;
      color: #000;
      border-radius: 20px;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>🚀 Welcome to Docker Nginx</h1>
    <p>Your containerized frontend is running successfully!</p>

</html>
